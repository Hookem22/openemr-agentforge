[mypy]
python_version = 3.12
ignore_missing_imports = False

# These two ship without type stubs or a py.typed marker -- not a real type error, just an
# untyped third-party dependency. voyageai and langfuse are already stub-free but don't trip this
# (mypy resolves them from installed metadata); listed explicitly here in case that changes.
[mypy-fitz.*]
ignore_missing_imports = True

[mypy-rank_bm25.*]
ignore_missing_imports = True
